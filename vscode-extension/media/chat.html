<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: var(--vscode-sideBar-background);
    --fg: var(--vscode-foreground);
    --border: var(--vscode-panel-border);
    --input-bg: var(--vscode-input-background);
    --input-fg: var(--vscode-input-foreground);
    --input-border: var(--vscode-input-border, transparent);
    --btn-bg: var(--vscode-button-background);
    --btn-fg: var(--vscode-button-foreground);
    --btn-hover: var(--vscode-button-hoverBackground);
    --muted: var(--vscode-descriptionForeground);
    --link: var(--vscode-textLink-foreground);
    --user-bubble: var(--vscode-editor-inactiveSelectionBackground);
    --code-bg: var(--vscode-textCodeBlock-background);
    --badge-bg: var(--vscode-badge-background);
    --badge-fg: var(--vscode-badge-foreground);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; font-family: var(--vscode-font-family); font-size: var(--vscode-font-size); color: var(--fg); background: var(--bg); }
  body { display: flex; flex-direction: column; }
  #toolbar { display: flex; align-items: center; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 11px; }
  #toolbar .spacer { flex: 1; }
  .icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 3px; font-size: 12px; }
  .icon-btn:hover { background: var(--btn-hover); color: var(--fg); }
  #messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 10px; }
  .msg { font-size: 12.5px; line-height: 1.5; }
  .msg.user { background: var(--user-bubble); padding: 8px 10px; border-radius: 6px; white-space: pre-wrap; word-break: break-word; }
  .msg.assistant { padding: 4px 2px; }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; font-size: 10.5px; }
  .badge { background: var(--badge-bg); color: var(--badge-fg); padding: 2px 6px; border-radius: 8px; }
  .badge.savings { background: #1a7f37; color: white; }
  .badge.muted { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .reasons { color: var(--muted); font-size: 10.5px; margin: 4px 0 8px; padding-left: 12px; }
  .reasons li { margin: 1px 0; }
  .content { white-space: pre-wrap; word-wrap: break-word; }
  .content pre { background: var(--code-bg); padding: 8px 10px; border-radius: 4px; overflow-x: auto; margin: 6px 0; font-family: var(--vscode-editor-font-family); font-size: 12px; white-space: pre; position: relative; }
  .content pre .lang-tag { position: absolute; top: 4px; right: 6px; font-size: 9px; color: var(--muted); }
  .content code { font-family: var(--vscode-editor-font-family); font-size: 12px; }
  .content :not(pre) > code { background: var(--code-bg); padding: 1px 4px; border-radius: 3px; }
  .actions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .actions button { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 3px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; }
  .actions button:hover { background: var(--btn-hover); color: var(--fg); }
  .actions button.primary { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }
  .actions button.primary:hover { background: var(--btn-hover); }
  #empty { color: var(--muted); font-size: 11px; padding: 16px; text-align: center; }
  #empty kbd { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-family: var(--vscode-editor-font-family); font-size: 10px; }
  #composer { border-top: 1px solid var(--border); padding: 8px; }
  #composer .row { display: flex; gap: 4px; align-items: center; margin-bottom: 4px; }
  #composer label { font-size: 10.5px; color: var(--muted); display: flex; align-items: center; gap: 4px; cursor: pointer; }
  #composer label input { margin: 0; }
  #input-wrap { display: flex; gap: 4px; }
  #input { flex: 1; background: var(--input-bg); color: var(--input-fg); border: 1px solid var(--input-border); border-radius: 4px; padding: 6px 8px; font-family: var(--vscode-font-family); font-size: 12.5px; resize: none; min-height: 32px; max-height: 200px; outline: none; }
  #input:focus { border-color: var(--vscode-focusBorder); }
  #send-btn { background: var(--btn-bg); color: var(--btn-fg); border: none; padding: 0 14px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  #send-btn:hover { background: var(--btn-hover); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .typing::after { content: "▍"; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .err { color: var(--vscode-errorForeground); font-size: 11px; padding: 6px; border-left: 2px solid var(--vscode-errorForeground); background: var(--code-bg); }
</style>
</head>
<body>
  <div id="toolbar">
    <span style="font-weight: 600;">Cupid</span>
    <span class="spacer"></span>
    <button class="icon-btn" id="reset-btn" title="Reset session memory">↻ Session</button>
    <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
  </div>
  <div id="messages">
    <div id="empty">
      Type a question below. <kbd>Enter</kbd> sends, <kbd>Shift+Enter</kbd> newline.<br>
      Check the box to include current file as context.
    </div>
  </div>
  <div id="composer">
    <div class="row">
      <label><input type="checkbox" id="include-sel"> include current file</label>
      <span class="spacer" style="flex:1"></span>
      <span id="status" style="font-size: 10.5px; color: var(--muted);"></span>
    </div>
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="Ask Cupid — it routes to the best model for your task..."></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
<script>
(function() {
  const vscode = acquireVsCodeApi();
  const messagesEl = document.getElementById("messages");
  const emptyEl = document.getElementById("empty");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const includeSel = document.getElementById("include-sel");
  const statusEl = document.getElementById("status");

  const msgState = new Map();

  function autoSize() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 200) + "px";
  }
  input.addEventListener("input", autoSize);

  function setStatus(s) { statusEl.textContent = s || ""; }

  function send() {
    const text = input.value.trim();
    if (!text) return;
    vscode.postMessage({ type: "send", text: text, includeSelection: includeSel.checked });
    input.value = "";
    autoSize();
    sendBtn.disabled = true;
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  document.getElementById("reset-btn").addEventListener("click", () => vscode.postMessage({ type: "resetSession" }));
  document.getElementById("settings-btn").addEventListener("click", () => vscode.postMessage({ type: "openSettings" }));

  function clearEmpty() { if (emptyEl) emptyEl.style.display = "none"; }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function(c) {
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
    });
  }

  const FENCE = String.fromCharCode(96,96,96);
  function renderContent(raw) {
    const re = new RegExp("(" + FENCE + "[\\s\\S]*?" + FENCE + ")", "g");
    const parts = raw.split(re);
    return parts.map(function(p) {
      if (p.indexOf(FENCE) === 0) {
        const inner = p.slice(3, -3);
        const nlIdx = inner.indexOf("\n");
        const lang = nlIdx >= 0 ? inner.slice(0, nlIdx).trim() : "";
        const code = nlIdx >= 0 ? inner.slice(nlIdx + 1) : inner;
        return '<pre><span class="lang-tag">' + escapeHtml(lang) + '</span><code>' + escapeHtml(code) + '</code></pre>';
      }
      return escapeHtml(p)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\n/g, "<br>");
    }).join("");
  }

  function makeBadge(text, cls) {
    const s = document.createElement("span");
    s.className = "badge" + (cls ? " " + cls : "");
    s.textContent = text;
    return s;
  }

  window.addEventListener("message", function(ev) {
    const m = ev.data;
    switch (m.type) {
      case "focusInput":
        if (m.prefill) input.value = m.prefill;
        autoSize();
        input.focus();
        break;
      case "userMsg": {
        clearEmpty();
        const div = document.createElement("div");
        div.className = "msg user";
        div.textContent = m.text;
        messagesEl.appendChild(div);
        scrollToBottom();
        break;
      }
      case "assistantStart": {
        const wrap = document.createElement("div");
        wrap.className = "msg assistant";
        const badges = document.createElement("div");
        badges.className = "badges";
        badges.appendChild(makeBadge("routing…", "muted"));
        const content = document.createElement("div");
        content.className = "content typing";
        content.setAttribute("data-role", "content");
        wrap.appendChild(badges);
        wrap.appendChild(content);
        messagesEl.appendChild(wrap);
        msgState.set(m.id, { wrap: wrap, raw: "" });
        setStatus("routing…");
        scrollToBottom();
        break;
      }
      case "stream": {
        const st = msgState.get(m.id); if (!st) break;
        if (m.event === "routing") {
          const badges = st.wrap.querySelector(".badges");
          badges.innerHTML = "";
          const r = m.data.routing;
          const c = m.data.classification;
          const ll = m.data.llmRouting;
          // Classification mode badge (first, most visible)
          if (ll) {
            badges.appendChild(makeBadge(ll.fellBackToRules ? "rules (LLM fellback)" : "LLM-assisted", "muted"));
          } else {
            badges.appendChild(makeBadge("rule-based", "muted"));
          }
          badges.appendChild(makeBadge(r.displayName));
          badges.appendChild(makeBadge(r.tier, "muted"));
          badges.appendChild(makeBadge(c.taskType, "muted"));
          if (r.reasons && r.reasons.length) {
            const ul = document.createElement("ul");
            ul.className = "reasons";
            for (const reason of r.reasons.slice(0, 4)) {
              const li = document.createElement("li");
              li.textContent = reason;
              ul.appendChild(li);
            }
            badges.after(ul);
          }
          setStatus("generating…");
        } else if (m.event === "chunk") {
          st.raw += m.data.text || "";
          const contentEl = st.wrap.querySelector('[data-role="content"]');
          contentEl.innerHTML = renderContent(st.raw);
          scrollToBottom();
        } else if (m.event === "done") {
          const contentEl = st.wrap.querySelector('[data-role="content"]');
          contentEl.classList.remove("typing");
          const badges = st.wrap.querySelector(".badges");
          const cost = m.data.costUsd;
          badges.appendChild(makeBadge("$" + cost.toFixed(5), "muted"));
          const hasCode = st.raw.indexOf(FENCE) >= 0;
          const actions = document.createElement("div");
          actions.className = "actions";
          if (hasCode) {
            const applyBtn = document.createElement("button");
            applyBtn.className = "primary";
            applyBtn.textContent = "Apply";
            applyBtn.title = "Replace current file content (Ctrl+Z to undo) OR write to detected paths";
            applyBtn.dataset.action = "apply";
            const diffBtn = document.createElement("button");
            diffBtn.textContent = "Diff";
            diffBtn.title = "Open side-by-side diff to review before applying";
            diffBtn.dataset.action = "diff";
            const newFileBtn = document.createElement("button");
            newFileBtn.textContent = "New file";
            newFileBtn.dataset.action = "newFile";
            const insertBtn = document.createElement("button");
            insertBtn.textContent = "Insert at cursor";
            insertBtn.dataset.action = "insert";
            const copyBtn = document.createElement("button");
            copyBtn.textContent = "Copy";
            copyBtn.dataset.action = "copy";
            actions.appendChild(applyBtn);
            actions.appendChild(diffBtn);
            actions.appendChild(newFileBtn);
            actions.appendChild(insertBtn);
            actions.appendChild(copyBtn);
          } else {
            const copyBtn = document.createElement("button");
            copyBtn.textContent = "Copy";
            copyBtn.dataset.action = "copy";
            actions.appendChild(copyBtn);
          }
          actions.addEventListener("click", function(e) {
            const tgt = e.target;
            if (!tgt || tgt.tagName !== "BUTTON") return;
            const action = tgt.dataset.action;
            if (action === "copy") {
              vscode.postMessage({ type: "copy", text: st.raw });
            } else if (action === "apply" || action === "newFile" || action === "insert" || action === "diff") {
              vscode.postMessage({ type: "apply", text: st.raw, mode: action === "apply" ? "auto" : action });
            }
          });
          st.wrap.appendChild(actions);
          msgState.delete(m.id);
          setStatus("");
          sendBtn.disabled = false;
        } else if (m.event === "error") {
          const contentEl = st.wrap.querySelector('[data-role="content"]');
          contentEl.classList.remove("typing");
          const errDiv = document.createElement("div");
          errDiv.className = "err";
          errDiv.textContent = m.data.message || "Error";
          st.wrap.appendChild(errDiv);
          msgState.delete(m.id);
          setStatus("error");
          sendBtn.disabled = false;
        } else if (m.event === "cpl") {
          const badges = st.wrap.querySelector(".badges");
          badges.appendChild(makeBadge("CPL +" + m.data.injectedEntries, "muted"));
        }
        break;
      }
      case "error": {
        const st = msgState.get(m.id);
        if (st) {
          const errDiv = document.createElement("div");
          errDiv.className = "err";
          errDiv.textContent = m.message;
          st.wrap.appendChild(errDiv);
          msgState.delete(m.id);
        } else {
          const div = document.createElement("div");
          div.className = "err";
          div.textContent = m.message;
          messagesEl.appendChild(div);
        }
        setStatus("error");
        sendBtn.disabled = false;
        scrollToBottom();
        break;
      }
      case "aborted": {
        const st = msgState.get(m.id);
        if (st) {
          const note = document.createElement("div");
          note.className = "err";
          note.textContent = "Stopped.";
          st.wrap.appendChild(note);
          msgState.delete(m.id);
        }
        setStatus("");
        sendBtn.disabled = false;
        break;
      }
      case "assistantEnd":
        sendBtn.disabled = false;
        break;
      case "sessionReset":
        setStatus("session reset");
        setTimeout(function() { setStatus(""); }, 1500);
        break;
    }
  });

  function scrollToBottom() {
    requestAnimationFrame(function() { messagesEl.scrollTop = messagesEl.scrollHeight; });
  }
})();
</script>
</body>
</html>
